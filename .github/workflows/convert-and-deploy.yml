name: Convert PDFs and Deploy

on:
  push:
    paths:
      - 'pdfs/**'
      - '.github/workflows/convert-and-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project dependencies
        run: uv sync

      - name: Convert all PDFs
        run: |
          uv run bind batch pdfs/ -o output/ --cpu-only --site-name "bind"
        env:
          TORCH_DEVICE: cpu

      - name: Build MkDocs site
        run: |
          cd output/site
          uv run mkdocs build -d ../../_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload EPUB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epubs
          path: output/*.epub
          if-no-files-found: ignore

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: convert
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
